<html lang="en">
<!-- Sets page language to English -->

<head>
<meta charset="UTF-8">
<!-- Ensures proper character encoding -->

<title>Quiz</title>
<!-- Title displayed in browser tab -->

<link rel="stylesheet" href="style.css">
<!-- Links external CSS stylesheet -->
</head>

<body>

<!-- Navigation bar (consistent across all pages) -->
<nav>
  <ul>
    <!-- Navigation links -->
    <li><a href="index.html">Home</a></li>
    <li><a href="concepts.html">Concepts</a></li>
    <li><a href="content1.html">Content 1</a></li>
    <li><a href="content2.html">Content 2</a></li>
    
    <!-- Current page should ideally have 'active' class -->
    <li><a href="quiz.html">Quiz</a></li>
    
    <li><a href="references.html">References</a></li>
    <li><a href="about.html">About</a></li>
  </ul>
</nav>

<!-- Main content container -->
<div class="container">

  <!-- Page title -->
  <h1>Responsive Design Quiz</h1>

  <!-- Quiz form -->
  <form id="quizForm">

    <!-- Groups related form elements -->
    <fieldset>
      <legend>Answer all questions</legend>

      <!-- Question 1 -->
      <label for="q1">1. What is responsive web design?</label>
      <input type="text" id="q1" placeholder="e.g., adapts to screen size" required>

      <!-- Question 2 -->
      <label for="q2">2. What are media queries used for?</label>
      <input type="text" id="q2" placeholder="e.g., screen size styling" required>

      <!-- Question 3 (dropdown selection) -->
      <label for="q3">3. Which approach starts with small screens first?</label>
      <select id="q3" required>
        <option value="">Select</option>
        <option value="mobile">Mobile-first</option>
        <option value="desktop">Desktop-first</option>
      </select>

      <!-- Question 4 -->
      <label for="q4">4. What unit helps layouts scale (%, px, or fixed)?</label>
      <input type="text" id="q4" placeholder="e.g., %" required>

      <!-- Question 5 -->
      <label for="q5">5. What CSS feature changes layout based on screen size?</label>
      <input type="text" id="q5" placeholder="e.g., media queries" required>

      <!-- Question 6 -->
      <label for="q6">6. Why is responsive design important?</label>
      <input type="text" id="q6" placeholder="e.g., better user experience" required>

      <!-- Question 7 -->
      <label for="q7">7. What does max-width: 100% do to images?</label>
      <input type="text" id="q7" placeholder="e.g., scales image" required>

      <!-- Question 8 (dropdown selection) -->
      <label for="q8">8. Which device typically has the smallest screen?</label>
      <select id="q8" required>
        <option value="">Select</option>
        <option value="phone">Phone</option>
        <option value="desktop">Desktop</option>
      </select>

      <!-- Question 9 -->
      <label for="q9">9. What layout system is commonly used for responsiveness?</label>
      <input type="text" id="q9" placeholder="e.g., flexbox or grid" required>

      <!-- Question 10 -->
      <label for="q10">10. What is the purpose of flexible layouts?</label>
      <input type="text" id="q10" placeholder="e.g., adapt to screens" required>

      <!-- Button triggers JavaScript function to check answers -->
      <button type="button" onclick="checkAnswer()">Submit</button>

    </fieldset>

  </form>

  <!-- Displays quiz results -->
  <p id="result"></p>

</div>

<!-- Links external JavaScript file for quiz functionality -->
<script src="script.js"></script>

</body>
</html>
