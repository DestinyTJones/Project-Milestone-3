<!DOCTYPE html>
<!-- Declares HTML5 document type -->

<html lang="en">
<!-- Sets the language of the page to English -->

<head>
<meta charset="UTF-8">
<!-- Ensures proper text encoding -->

<title>Quiz</title>
<!-- Title shown in browser tab -->

<link rel="stylesheet" href="style.css">
<!-- Links external CSS file for styling -->
</head>

<body>

<!-- NAVIGATION BAR
     Provides links to all pages in the site -->
<nav>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="concepts.html">Concepts</a></li>
    <li><a href="content1.html">Content 1</a></li>
    <li><a href="content2.html">Content 2</a></li>

    <!-- 'active' class highlights current page -->
    <li><a href="quiz.html" class="active">Quiz</a></li>

    <li><a href="references.html">References</a></li>
    <li><a href="about.html">About</a></li>
  </ul>
</nav>

<!-- MAIN CONTENT CONTAINER -->
<div class="container">

  <!-- Page heading -->
  <h1>Responsive Design Quiz</h1>

  <!-- QUIZ FORM
       Contains all questions and inputs -->
  <form id="quizForm">

    <!-- Groups related form elements -->
    <fieldset>
      <legend>Answer all questions</legend>

      <!-- Question 1 -->
      <label for="q1">1. What is responsive web design?</label>
      <input type="text" id="q1" required>

      <!-- Question 2 -->
      <label for="q2">2. What are media queries used for?</label>
      <input type="text" id="q2" required>

      <!-- Question 3 (Dropdown) -->
      <label for="q3">3. Which approach starts with small screens first?</label>
      <select id="q3" required>
        <option value="">Select</option>
        <option value="mobile">Mobile-first</option>
        <option value="desktop">Desktop-first</option>
      </select>

      <!-- Question 4 -->
      <label for="q4">4. What unit helps layouts scale (%, px, or fixed)?</label>
      <input type="text" id="q4" required>

      <!-- Question 5 -->
      <label for="q5">5. What CSS feature changes layout based on screen size?</label>
      <input type="text" id="q5" required>

      <!-- Question 6 -->
      <label for="q6">6. Why is responsive design important?</label>
      <input type="text" id="q6" required>

      <!-- Question 7 -->
      <label for="q7">7. What does max-width: 100% do to images?</label>
      <input type="text" id="q7" required>

      <!-- Question 8 (Dropdown) -->
      <label for="q8">8. Which device typically has the smallest screen?</label>
      <select id="q8" required>
        <option value="">Select</option>
        <option value="phone">Phone</option>
        <option value="desktop">Desktop</option>
      </select>

      <!-- Question 9 -->
      <label for="q9">9. What layout system is commonly used for responsiveness?</label>
      <input type="text" id="q9" required>

      <!-- Question 10 -->
      <label for="q10">10. What is the purpose of flexible layouts?</label>
      <input type="text" id="q10" required>

      <!-- BUTTONS
           Controlled by JavaScript (no inline onclick) -->
      <button type="button" id="submitBtn">Submit</button>

      <!-- Hidden until quiz is submitted -->
      <button type="button" id="retryBtn" style="display:none;">Retake Quiz</button>

    </fieldset>
  </form>

  <!-- RESULTS SECTION
       Updated dynamically with JavaScript -->
  <h2 id="result"></h2>

  <!-- (Optional container - not required for your latest JS,
       but kept for flexibility if you expand later) -->
  <div id="answers"></div>

</div>

<!-- Links JavaScript file for quiz functionality -->
<script src="script.js"></script>

</body>
</html>
